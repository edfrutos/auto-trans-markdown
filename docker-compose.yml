services:
  md-translate:
    build: .
    ports:
      - "5400:5400"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 5400
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5400/api/languages', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
